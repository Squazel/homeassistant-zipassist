clear_system_fault:
  name: Clear System Fault
  description: Clear a system fault on a ZipAssist hydrotap.
  fields:
    device_id:
      name: Device ID
      description: The hydrotap ID (UUID) of the device.
      required: true
      example: "00000000-0000-0000-0000-000000000001"
      selector:
        text: {}
    fault_id:
      name: Fault ID
      description: The ID of the system fault to clear.
      required: true
      example: "fault-1"
      selector:
        text: {}

set_temperature:
  name: Set Temperature
  description: Set the boiling or chilled water temperature on a ZipAssist hydrotap.
  fields:
    device_id:
      name: Device ID
      description: The hydrotap ID (UUID) of the device.
      required: true
      example: "00000000-0000-0000-0000-000000000001"
      selector:
        text: {}
    water_type:
      name: Water Type
      description: The water type to set temperature for.
      required: true
      default: "boiling"
      selector:
        select:
          options:
            - "boiling"
            - "chilled"
    temperature:
      name: Temperature
      description: Target temperature in degrees Celsius.
      required: true
      example: 98.0
      selector:
        number:
          min: 5
          max: 100
          step: 0.5
          unit_of_measurement: "°C"